app = "acid-talent-web"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  BACKEND_PROXY_BASE = "https://acid-talent-api.fly.dev"
  BACKEND_PROXY_HOST = "acid-talent-api.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
